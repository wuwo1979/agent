name: MCP 本地工具网关 CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt
          pip install -r requirements/dev.txt

      - name: Run tests
        shell: bash -e {0}
        run: |
          python -c "import sys; print(f'Python: {sys.version}')"
          python -c "import shutil; print(f'python: {shutil.which(\"python\") or \"NOT FOUND\"}')"
          python -c "import shutil; print(f'python3: {shutil.which(\"python3\") or \"NOT FOUND\"}')"
          python -c "import pytest_asyncio; print(f'pytest-asyncio: {pytest_asyncio.__version__}')"
          python -c "import pytest; print(f'pytest: {pytest.__version__}')"
          # Run tests one file at a time, capture output to file for artifact upload
          mkdir -p test_output
          python -m pytest tests/test_mcp.py -v --tb=long 2>&1 | tee test_output/test_mcp.log || echo "test_mcp failed" >> test_output/failures.txt
          python -m pytest tests/test_agent.py -v --tb=long 2>&1 | tee test_output/test_agent.log || echo "test_agent failed" >> test_output/failures.txt
          python -m pytest tests/test_integration.py -v --tb=long 2>&1 | tee test_output/test_integration.log || echo "test_integration failed" >> test_output/failures.txt
          python -m pytest tests/test_security.py -v --tb=long 2>&1 | tee test_output/test_security.log || echo "test_security failed" >> test_output/failures.txt
          python -m pytest tests/ -v --tb=long --ignore=tests/test_scenarios.py --cov=. --cov-report=xml --cov-report=term-missing 2>&1 | tee test_output/all_tests.log || echo "all_tests failed" >> test_output/failures.txt
          # Fail if any test file had failures
          if [ -f test_output/failures.txt ]; then
            echo "=== TEST FAILURES ==="
            cat test_output/failures.txt
            echo "=== ALL TEST LOGS ==="
            for f in test_output/*.log; do echo "=== $f ==="; cat "$f"; done
            exit 1
          fi

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.python-version }}
          path: test_output/

      - name: Run benchmark (optional, may skip if langgraph not installed)
        run: |
          python tests/benchmark.py || echo "benchmark skipped (no error)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install ruff pytest pytest-asyncio pytest-cov
          pip install -r requirements/runtime.txt

      - name: Lint with ruff
        run: |
          ruff check . --select=E,F,W --ignore=E501
          echo "ruff gate: PASSED"

      - name: Verify imports + security checks
        run: |
          python tests/verify_imports.py

      - name: Run unit tests (core only, no optional deps)
        run: |
          python -m pytest tests/test_mcp.py tests/test_integration.py -v --tb=short --cov=. --cov-report=term-missing || echo "some tests may need optional deps"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mcp-gateway -f docker/Dockerfile .

      - name: Verify Docker image
        run: |
          docker images mcp-gateway
