name: MCP Agent Gateway CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt
          pip install -r requirements/dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Run benchmark (optional, may skip if langgraph not installed)
        run: |
          python tests/benchmark.py || echo "benchmark skipped (no error)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          pip install ruff pytest pytest-asyncio pytest-cov
          pip install -r requirements/runtime.txt

      - name: Lint with ruff
        run: |
          ruff check . --select=E,F,W --ignore=E501

      - name: Run unit tests (core only, no optional deps)
        run: |
          python -m pytest tests/test_mcp.py tests/test_integration.py -v --tb=short --cov=. --cov-report=term-missing || echo "some tests may need optional deps"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mcp-gateway -f docker/Dockerfile .

      - name: Verify Docker image
        run: |
          docker images mcp-gateway