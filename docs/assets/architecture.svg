<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <style>
      .bg { fill: #0d1117 }
      .box { fill: #161b22; stroke: #30363d; stroke-width: 1.5; rx: 6 }
      .box-active { fill: #1c2333; stroke: #58a6ff; stroke-width: 1.5; rx: 6 }
      .label { fill: #c9d1d9; font-size: 12px; text-anchor: middle; dominant-baseline: central }
      .label-bold { fill: #58a6ff; font-size: 13px; font-weight: bold; text-anchor: middle; dominant-baseline: central }
      .label-small { fill: #8b949e; font-size: 10px; text-anchor: middle; dominant-baseline: central }
      .arrow { stroke: #30363d; stroke-width: 1.5; fill: none }
      .arrow-accent { stroke: #58a6ff; stroke-width: 1.5; fill: none }
      .dot { fill: #3fb950; rx: 2 }
      .section-title { fill: #d29922; font-size: 11px; text-anchor: middle; dominant-baseline: central; font-weight: bold }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="960" height="480"/>

  <!-- Title -->
  <text x="480" y="22" fill="#58a6ff" font-size="15" font-weight="bold" text-anchor="middle">MCP Agent Gateway v2.0 — Architecture</text>
  <text x="480" y="38" fill="#8b949e" font-size="10" text-anchor="middle">Unified protocol kernel · Thin transport adapters · Pluggable middleware</text>

  <!-- Layer 1: AI Agents -->
  <rect class="box" x="30" y="52" width="180" height="80" />
  <text class="label-bold" x="120" y="78">AI Agent Layer</text>
  <text class="label-small" x="120" y="96">Trae · Dify · Cursor · VS Code</text>
  <text class="label-small" x="120" y="110">Any MCP-compatible client</text>

  <!-- Layer 1: Transport -->
  <rect class="box" x="240" y="52" width="220" height="80" />
  <text class="label-bold" x="350" y="78">Transport Layer (Thin Adapters)</text>
  <text class="label-small" x="350" y="96">STDIOTransport · HTTPTransport</text>
  <text class="label-small" x="350" y="110">Protocol dispatch to unified kernel</text>

  <!-- Layer 1: Protocol Kernel -->
  <rect class="box-active" x="490" y="52" width="220" height="80" />
  <text class="label-bold" x="600" y="78">MCP Protocol Kernel</text>
  <text class="label-small" x="600" y="96">MCPProtocolHandler (唯一执行入口)</text>
  <text class="label-small" x="600" y="110">JSON-RPC 2.0 · 统一错误码</text>

  <!-- Layer 1: Tool Registry -->
  <rect class="box" x="740" y="52" width="190" height="80" />
  <text class="label-bold" x="835" y="78">Tool Registry</text>
  <text class="label-small" x="835" y="96">17 tools · 5 providers</text>
  <text class="label-small" x="835" y="110">filesystem · terminal · database</text>
  <text class="label-small" x="835" y="120">web · llm</text>

  <!-- Arrows: Agent → Transport → Kernel → Registry -->
  <path class="arrow" d="M210,92 L240,92"/>
  <polygon fill="#30363d" points="237,87 247,92 237,97"/>
  <path class="arrow-accent" d="M460,92 L490,92"/>
  <polygon fill="#58a6ff" points="487,87 497,92 487,97"/>
  <path class="arrow" d="M710,92 L740,92"/>
  <polygon fill="#30363d" points="737,87 747,92 737,97"/>

  <!-- Subtitle: Transport protocol notes -->
  <text class="label-small" x="120" y="145">STDIO: stdin/stdout JSON-RPC</text>
  <text class="label-small" x="350" y="145">HTTP: REST + SSE streaming</text>
  <text class="label-small" x="600" y="145">Session Context · Middleware Pipeline</text>
  <text class="label-small" x="835" y="145">Sandbox isolation · Access control</text>

  <!-- Layer 2: Middleware Pipeline -->
  <rect class="box" x="120" y="170" width="720" height="48" />
  <text class="section-title" x="480" y="182">Middleware Pipeline (before / after hooks)</text>
  <rect class="dot" x="160" y="192" width="80" height="10" /><text class="label-small" x="250" y="197">[Auth] API Key verification</text>
  <rect class="dot" x="370" y="192" width="80" height="10" /><text class="label-small" x="460" y="197">[RateLimit] Per-key throttling</text>
  <rect class="dot" x="570" y="192" width="80" height="10" /><text class="label-small" x="660" y="197">[Audit] Logging</text>
  <rect class="dot" x="740" y="192" width="80" height="10" /><text class="label-small" x="830" y="197">[Cache] Response caching</text>

  <!-- Arrow down from kernel to pipeline -->
  <path class="arrow" d="M600,132 L600,170"/><polygon fill="#30363d" points="595,167 600,177 605,167"/>

  <!-- Layer 3: Tools Detail -->
  <rect class="box" x="30" y="240" width="160" height="105" />
  <text class="label-bold" x="110" y="258">Filesystem</text>
  <text class="label-small" x="110" y="275">read_file · write_file</text>
  <text class="label-small" x="110" y="289">list_dir · search_files</text>
  <text class="label-small" x="110" y="303">file_stat</text>
  <text class="label-small" x="110" y="323" fill="#3fb950">✓ Path sandbox</text>

  <rect class="box" x="210" y="240" width="130" height="105" />
  <text class="label-bold" x="275" y="258">Terminal</text>
  <text class="label-small" x="275" y="275">run_command</text>
  <text class="label-small" x="275" y="289">sysinfo</text>
  <text class="label-small" x="275" y="323" fill="#3fb950">✓ Command whitelist</text>

  <rect class="box" x="360" y="240" width="130" height="105" />
  <text class="label-bold" x="425" y="258">Database</text>
  <text class="label-small" x="425" y="275">query · execute</text>
  <text class="label-small" x="425" y="289">list_tables</text>
  <text class="label-small" x="425" y="303">describe_table</text>
  <text class="label-small" x="425" y="323" fill="#3fb950">✓ SQL injection guard</text>

  <rect class="box" x="510" y="240" width="130" height="105" />
  <text class="label-bold" x="575" y="258">Web</text>
  <text class="label-small" x="575" y="275">web_fetch · web_api</text>
  <text class="label-small" x="575" y="289">json_query</text>
  <text class="label-small" x="575" y="323" fill="#3fb950">✓ URL validation</text>

  <rect class="box" x="660" y="240" width="160" height="105" />
  <text class="label-bold" x="740" y="258">LLM (Ollama)</text>
  <text class="label-small" x="740" y="275">llm_call · llm_ping</text>
  <text class="label-small" x="740" y="289">llm_list_models</text>
  <text class="label-small" x="740" y="323" fill="#f85149">⚠ Fault isolation</text>

  <!-- Arrow down from pipeline to tools -->
  <path class="arrow" d="M480,218 L480,240"/><polygon fill="#30363d" points="475,237 480,247 485,237"/>

  <!-- Layer 4: Local Resources -->
  <rect class="box" x="140" y="365" width="680" height="40" />
  <text class="label-bold" x="480" y="385">Local Resources (Sandboxed)</text>
  <text class="label-small" x="300" y="395">File system (path whitelist)</text>
  <text class="label-small" x="480" y="395">Shell (command control)</text>
  <text class="label-small" x="660" y="395">SQLite / MySQL (query guard)</text>
  <text class="label-small" x="820" y="395">Ollama (fault isolation)</text>

  <!-- Arrow from tools to resources -->
  <path class="arrow" d="M480,345 L480,365"/><polygon fill="#30363d" points="475,362 480,372 485,362"/>

  <!-- Footer -->
  <text x="30" y="430" fill="#3fb950" font-size="11" font-weight="bold">Security:</text>
  <text x="30" y="446" fill="#8b949e" font-size="10">Multi-tenant API Keys · Path traversal protection · Command syntax filtering · Parameterized queries</text>

  <text x="30" y="465" fill="#d29922" font-size="11" font-weight="bold">Multi-Tenancy:</text>
  <text x="30" y="478" fill="#8b949e" font-size="10">admin (full access) · dify_default (Dify tools) · ollama_local (Ollama inference)</text>
</svg>