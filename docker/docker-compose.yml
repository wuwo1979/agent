version: "3.9"

services:
  # ==================== MCP 本地工具网关 ====================
  mcp-tool-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mcp-tool-gateway
    ports:
      - "9090:9090"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=http://ollama:11434
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    volumes:
      - ../mcp_data:/app/data
      - ../mcp_logs:/app/logs
    command: python main.py --host 0.0.0.0 --port 9090
    depends_on:
      ollama:
        condition: service_started
      chroma:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ==================== Ollama (CPU 模式) ====================
  # 由于主机 RTX 3060 Laptop GPU 与 Ollama 0.3.x 静态 CUDA 内核存在兼容缺陷，
  # 此处不传递 NVIDIA GPU，容器自动以 CPU 模式运行。
  # 如需 GPU 加速，更新 Ollama 版本或使用兼容的 CUDA 构建。
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped

  # ==================== ChromaDB (向量库) ====================
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma-server
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # ==================== Milvus (向量库) ====================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    command: milvus run standalone
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  etcd_data:
  minio_data:
  milvus_data: